<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Card Market" />
    <meta name="theme-color" content="#ffffff" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>Card Market Intelligence</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --color-background-primary: #ffffff;
        --color-background-secondary: #f5f5f4;
        --color-background-tertiary: #f0ede8;
        --color-background-info: #e6f1fb;
        --color-background-danger: #fcebeb;
        --color-background-success: #eaf3de;
        --color-background-warning: #faeeda;
        --color-text-primary: #1a1a18;
        --color-text-secondary: #6b6b66;
        --color-text-tertiary: #9b9b96;
        --color-text-info: #185fa5;
        --color-text-danger: #a32d2d;
        --color-text-success: #3b6d11;
        --color-text-warning: #854f0b;
        --color-border-tertiary: rgba(0,0,0,0.10);
        --color-border-secondary: rgba(0,0,0,0.20);
        --color-border-primary: rgba(0,0,0,0.30);
        --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        --font-mono: 'SF Mono', 'Fira Code', monospace;
        --border-radius-md: 8px;
        --border-radius-lg: 12px;
        --border-radius-xl: 16px;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --color-background-primary: #1c1c1a;
          --color-background-secondary: #252523;
          --color-background-tertiary: #2e2e2b;
          --color-background-info: #042c53;
          --color-background-danger: #501313;
          --color-background-success: #173404;
          --color-background-warning: #412402;
          --color-text-primary: #f0ede8;
          --color-text-secondary: #a8a8a0;
          --color-text-tertiary: #6b6b66;
          --color-text-info: #85b7eb;
          --color-text-danger: #f09595;
          --color-text-success: #97c459;
          --color-text-warning: #ef9f27;
          --color-border-tertiary: rgba(255,255,255,0.10);
          --color-border-secondary: rgba(255,255,255,0.20);
          --color-border-primary: rgba(255,255,255,0.30);
        }
      }
      html { height: 100%; }
      body {
        font-family: var(--font-sans);
        background: var(--color-background-tertiary);
        color: var(--color-text-primary);
        min-height: 100%;
        -webkit-font-smoothing: antialiased;
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
      }
      input, select, button {
        font-family: inherit;
        font-size: 16px; /* prevents iOS zoom on focus */
        padding: 10px 12px;
        border: 0.5px solid var(--color-border-secondary);
        border-radius: var(--border-radius-md);
        background: var(--color-background-primary);
        color: var(--color-text-primary);
        outline: none;
        transition: border-color 0.15s;
        -webkit-appearance: none;
      }
      input:focus, select:focus { border-color: var(--color-border-primary); }
      button { cursor: pointer; }
      #root { min-height: 100%; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
